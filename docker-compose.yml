services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-6730}
      GROQ_API_KEY: ${GROQ_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${PORT:-6730}:6730"
    restart: unless-stopped
